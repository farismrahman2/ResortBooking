name: Keep Vercel function warm

# Pings /api/health every 5 minutes during BD business hours
# (8am–10pm Asia/Dhaka = 02:00–16:00 UTC). Outside those hours the
# first user of the day pays one cold start, then it stays warm.
#
# To activate: set the repository secret APP_URL to the production
# Vercel URL (e.g. https://resort-agent.vercel.app) — the workflow
# silently skips if the secret is missing, so adding it later is enough.

on:
  schedule:
    - cron: '*/5 2-16 * * *'
  workflow_dispatch:  # manual trigger for testing

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Ping /api/health
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL secret is not set; skipping (set it in repo Settings → Secrets → Actions)"
            exit 0
          fi
          for i in 1 2 3; do
            if curl -fsSL --max-time 8 "$APP_URL/api/health" > /dev/null; then
              echo "Ping $i ok"
              exit 0
            fi
            sleep 2
          done
          echo "All retries failed"
          exit 1
